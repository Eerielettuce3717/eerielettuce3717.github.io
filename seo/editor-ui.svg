<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Online IDE browser JavaScript editor with syntax highlighting</title>
  <desc id="desc">Mockup of a web-based code editor showing JavaScript source in a dark theme IDE layout</desc>
  <rect width="640" height="360" fill="#11111b"/>
  <rect x="0" y="0" width="640" height="28" fill="#181825"/>
  <circle cx="14" cy="14" r="5" fill="#f38ba8"/>
  <circle cx="30" cy="14" r="5" fill="#f9e2af"/>
  <circle cx="46" cy="14" r="5" fill="#a6e3a1"/>
  <text x="200" y="18" fill="#6c7086" font-family="monospace" font-size="11">main.js  Nexus Online IDE</text>
  <rect x="0" y="28" width="120" height="332" fill="#0e0e16"/>
  <text x="12" y="52" fill="#89b4fa" font-family="monospace" font-size="10">main.js</text>
  <text x="12" y="68" fill="#6c7086" font-family="monospace" font-size="10">style.css</text>
  <text x="12" y="84" fill="#6c7086" font-family="monospace" font-size="10">index.html</text>
  <text x="140" y="58" fill="#cba6f7" font-family="monospace" font-size="13">function</text>
  <text x="220" y="58" fill="#cdd6f4" font-family="monospace" font-size="13"> greet(name) {</text>
  <text x="156" y="82" fill="#cdd6f4" font-family="monospace" font-size="13">  return </text>
  <text x="228" y="82" fill="#a6e3a1" font-family="monospace" font-size="13">`Hello, ${name}!`</text>
  <text x="140" y="106" fill="#cdd6f4" font-family="monospace" font-size="13">}</text>
  <text x="140" y="138" fill="#cba6f7" font-family="monospace" font-size="13">console</text>
  <text x="210" y="138" fill="#cdd6f4" font-family="monospace" font-size="13">.log(</text>
  <text x="260" y="138" fill="#a6e3a1" font-family="monospace" font-size="13">greet(</text>
  <text x="320" y="138" fill="#fab387" font-family="monospace" font-size="13">'World'</text>
  <text x="380" y="138" fill="#a6e3a1" font-family="monospace" font-size="13">)</text>
  <text x="400" y="138" fill="#cdd6f4" font-family="monospace" font-size="13">);</text>
</svg>
