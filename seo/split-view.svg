<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Browser based IDE code execution environment split view</title>
  <desc id="desc">Split view mockup showing HTML source on the left and live web preview on the right in an online IDE</desc>
  <rect width="640" height="360" fill="#11111b"/>
  <rect x="0" y="0" width="640" height="28" fill="#181825"/>
  <text x="12" y="18" fill="#6c7086" font-family="monospace" font-size="11">Editor · Preview  Nexus Online IDE</text>
  <line x1="320" y1="28" x2="320" y2="360" stroke="#313244" stroke-width="1"/>
  <text x="12" y="52" fill="#f38ba8" font-family="monospace" font-size="11">&lt;h1&gt;</text>
  <text x="60" y="52" fill="#cdd6f4" font-family="monospace" font-size="11">Hello Web</text>
  <text x="140" y="52" fill="#f38ba8" font-family="monospace" font-size="11">&lt;/h1&gt;</text>
  <text x="12" y="72" fill="#89b4fa" font-family="monospace" font-size="11">button</text>
  <text x="70" y="72" fill="#cdd6f4" font-family="monospace" font-size="11">{</text>
  <text x="80" y="92" fill="#fab387" font-family="monospace" font-size="11">onClick</text>
  <text x="140" y="92" fill="#cdd6f4" font-family="monospace" font-size="11">: alert(</text>
  <text x="210" y="92" fill="#a6e3a1" font-family="monospace" font-size="11">'Run!'</text>
  <text x="250" y="92" fill="#cdd6f4" font-family="monospace" font-size="11">)</text>
  <rect x="340" y="44" width="280" height="300" rx="6" fill="#fff"/>
  <text x="420" y="100" fill="#111" font-family="sans-serif" font-size="22" font-weight="bold">Hello Web</text>
  <rect x="420" y="120" width="80" height="28" rx="4" fill="#89b4fa"/>
  <text x="438" y="139" fill="#111" font-family="sans-serif" font-size="12">Click me</text>
  <text x="340" y="330" fill="#6c7086" font-family="monospace" font-size="10">Live preview panel</text>
</svg>
